name: Claude Code

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: >
      github.event_name == 'issue_comment' &&
      github.event.comment.user.login == github.repository_owner &&
      !github.event.issue.pull_request &&
      (contains(github.event.comment.body, '@claude') ||
       startsWith(github.event.comment.body, '/'))

    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        if: env.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION || 'us-east-1' }}

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_bedrock: ${{ env.AWS_ROLE_ARN != '' && 'true' || 'false' }}
          trigger_phrase: "@claude"
          claude_args: >-
            --max-turns 200
            --model anthropic.claude-sonnet-4-6
            --allowedTools "Bash(git *),Bash(npm *),Bash(npx *),Bash(node *),Bash(ls *),Bash(mkdir *),Bash(cp *),Bash(cat *),Read,Write,Edit,Glob,Grep,mcp__github__get_issue,mcp__github__list_issues,mcp__github__create_branch,mcp__github__push_files,mcp__github__create_pull_request,mcp__github__update_issue,mcp__github__add_issue_comment"
