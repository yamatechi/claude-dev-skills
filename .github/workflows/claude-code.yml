name: Claude Code

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: >
      github.event_name == 'issue_comment' &&
      github.event.comment.user.login == github.repository_owner &&
      !github.event.issue.pull_request &&
      (contains(github.event.comment.body, '@claude') ||
       startsWith(github.event.comment.body, '/'))

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          claude_args: >-
            --max-turns 200
            --allowedTools "Bash(git *),Bash(npm *),Bash(npx *),Bash(node *),Bash(ls *),Bash(mkdir *),Bash(cp *),Bash(cat *),Read,Write,Edit,Glob,Grep,mcp__github__get_issue,mcp__github__list_issues,mcp__github__create_branch,mcp__github__push_files,mcp__github__create_pull_request,mcp__github__update_issue,mcp__github__add_issue_comment"
